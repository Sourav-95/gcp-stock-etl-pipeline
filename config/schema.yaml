  - { name: revenuePerShare,         type: double }
  - { name: totalCashPerShare,       type: double }
  - { name: totalRevenue,            type: long   }
  - { name: totalCash,               type: long   }
  - { name: totalDebt,               type: long   }
  - { name: ebitda,                  type: long   }
  - { name: grossProfits,            type: long   }
  - { name: freeCashflow,            type: long   }
  - { name: operatingCashflow,       type: long   }
  - { name: netIncomeToCommon,       type: long   }
  - { name: profitMargins,           type: double }
  - { name: grossMargins,            type: double }
  - { name: operatingMargins,        type: double }
  - { name: ebitdaMargins,           type: double }
  - { name: returnOnAssets,          type: double }
