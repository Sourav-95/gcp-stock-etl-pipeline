# Rules:
#   - Only fields useful for analytics are listed; junk/meta keys are excluded
#   - companyOfficers, executiveTeam, corporateActions dropped at read time
#   - "52WeekChange" and "SandP52WeekChange" map from JSON keys that start with
#     digits (invalid in BigQuery). They are READ as-is by Spark (StructField
#     name is just a string), then RENAMED in transformer.py before BQ write.

columns:
  - { name: ticker_id,               type: string }
  - { name: ingestion_date,          type: date   }  
  - { name: symbol,                  type: string }
  - { name: longName,                type: string }
  - { name: shortName,               type: string }
  - { name: sector,                  type: string }
  - { name: sectorKey,               type: string }
  - { name: industry,                type: string }
  - { name: industryKey,             type: string }
  - { name: country,                 type: string }
  - { name: city,                    type: string }
  - { name: currency,                type: string }
  - { name: financialCurrency,       type: string }
  - { name: exchange,                type: string }
  - { name: fullExchangeName,        type: string }
  - { name: quoteType,               type: string }
  - { name: market,                  type: string }
  - { name: website,                 type: string }
  - { name: recommendationKey,       type: string }   
  - { name: averageAnalystRating,    type: string }  
  - { name: currentPrice,            type: double }
  - { name: previousClose,           type: double }
  - { name: open,                    type: double }
  - { name: dayLow,                  type: double }
  - { name: dayHigh,                 type: double }
  - { name: regularMarketChange,     type: double }
  - { name: regularMarketChangePercent, type: double }
  - { name: volume,                  type: long   }
  - { name: averageVolume,           type: long   }
  - { name: averageVolume10days,     type: long   }
  - { name: averageDailyVolume3Month, type: long  }
  - { name: fiftyTwoWeekLow,         type: double }
  - { name: fiftyTwoWeekHigh,        type: double }
  - { name: fiftyDayAverage,         type: double }
  - { name: twoHundredDayAverage,    type: double }
  - { name: "52WeekChange",          type: double }   
  - { name: SandP52WeekChange,       type: double }   
  - { name: marketCap,               type: long   }
  - { name: enterpriseValue,         type: long   }
  - { name: trailingPE,              type: double }
  - { name: forwardPE,               type: double }
  - { name: pegRatio,                type: double }
  - { name: trailingPegRatio,        type: double }
  - { name: priceToBook,             type: double }
  - { name: priceToSalesTrailing12Months, type: double }
  - { name: enterpriseToRevenue,     type: double }
  - { name: enterpriseToEbitda,      type: double }
  - { name: bookValue,               type: double }
